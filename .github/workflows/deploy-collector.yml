name: Deploy Collector

on:
  push:
    branches: [main]
    paths:
      - "cloud-run/**"
      - ".github/workflows/deploy-collector.yml"
  workflow_dispatch:

permissions:
  id-token: write   # Workload Identity Federation 用
  contents: read

jobs:
  deploy:
    name: Build & Deploy pay-collector
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloud-run
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Cloud Build (Docker push to Artifact Registry)
        # --default-buckets-behavior=REGIONAL_USER_OWNED_BUCKET:
        # CI から実行する gcloud builds submit がデフォルト global ログバケットへの
        # ストリーム権限不足で exit 1 を返す問題を回避（ビルド自体は成功するが
        # ログ tail で失敗する）。リージョナル user-owned bucket に切替
        run: |
          gcloud builds submit \
            --tag "${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/cloud-run-images/pay-collector" \
            --default-buckets-behavior=REGIONAL_USER_OWNED_BUCKET \
            --project="${{ vars.GCP_PROJECT_ID }}"

      - name: Deploy to Cloud Run
        # ADR-0004: --no-cpu-throttling --max-instances=3 を明示
        # collector は OIDC 認証必須 (--no-allow-unauthenticated)
        # runtime SA は IAM signBlob によるキーレス DWD で pay-collector を使用
        run: |
          gcloud run deploy pay-collector \
            --image "${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/cloud-run-images/pay-collector" \
            --platform managed \
            --region "${{ vars.GCP_REGION }}" \
            --memory 2Gi \
            --timeout 1800 \
            --no-cpu-throttling \
            --max-instances 3 \
            --no-allow-unauthenticated \
            --service-account "pay-collector@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com" \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --quiet

      - name: Show deployed revision
        run: |
          gcloud run services describe pay-collector \
            --region="${{ vars.GCP_REGION }}" \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --format='value(status.latestCreatedRevisionName)'
