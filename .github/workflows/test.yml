name: Test

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  dashboard-tests:
    name: Dashboard tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Install Japanese font (required by receipt_pdf tests)
        # Dockerfile と同じ fonts-ipafont-gothic を入れて日本語 PDF 生成を有効化
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-ipafont-gothic

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: dashboard/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run pytest
        run: python -m pytest tests/ -v

  cloud-run-tests:
    name: Cloud Run tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloud-run
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: cloud-run/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run pytest
        run: python -m pytest tests/ -v
