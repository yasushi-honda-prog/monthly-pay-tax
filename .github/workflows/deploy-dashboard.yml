name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - "docs/operations/**"
      - ".github/workflows/deploy-dashboard.yml"
  workflow_dispatch:

permissions:
  id-token: write   # Workload Identity Federation 用
  contents: read

jobs:
  test:
    name: Dashboard tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Install Japanese font (required by receipt_pdf tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-ipafont-gothic

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: dashboard/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run pytest
        run: python -m pytest tests/ -v

  deploy:
    name: Build & Deploy pay-dashboard
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Bundle docs/operations into build context
        # operations_docs ページが /app/docs/operations を参照するため、
        # build context (dashboard/) に docs/operations をコピー。
        # ローカル開発では repo_root/docs/operations を参照（_resolve_docs_dir で両対応）。
        # 冪等性確保: 既存 dashboard/docs/operations を事前に削除（再 build や self-hosted runner 対策）
        run: |
          rm -rf docs/operations
          mkdir -p docs
          cp -R ../docs/operations docs/operations

      - name: Cloud Build (Docker push to Artifact Registry)
        # --default-buckets-behavior=REGIONAL_USER_OWNED_BUCKET:
        # CI から実行する gcloud builds submit がデフォルト global ログバケットへの
        # ストリーム権限不足で exit 1 を返す問題を回避（ビルド自体は成功するが
        # ログ tail で失敗する）。リージョナル user-owned bucket に切替
        run: |
          gcloud builds submit \
            --tag "${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/cloud-run-images/pay-dashboard" \
            --default-buckets-behavior=REGIONAL_USER_OWNED_BUCKET \
            --project="${{ vars.GCP_PROJECT_ID }}"

      - name: Deploy to Cloud Run
        # ADR-0004: --no-cpu-throttling --max-instances=3 を明示（dashboard も適用済み）
        # runtime SA は pay-collector を流用（dashboard / collector 共通）
        run: |
          gcloud run deploy pay-dashboard \
            --image "${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/cloud-run-images/pay-dashboard" \
            --platform managed \
            --region "${{ vars.GCP_REGION }}" \
            --memory 512Mi \
            --no-cpu-throttling \
            --max-instances 3 \
            --allow-unauthenticated \
            --service-account "pay-collector@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com" \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --quiet

      - name: Show deployed revision
        run: |
          gcloud run services describe pay-dashboard \
            --region="${{ vars.GCP_REGION }}" \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --format='value(status.latestCreatedRevisionName,status.url)'
